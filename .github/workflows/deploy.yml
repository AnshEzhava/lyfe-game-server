name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -q

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: target/lyfe-game-server-0.0.1-SNAPSHOT.jar
          target: /opt/springboot/
          strip_components: 1
          overwrite: true

      - name: Write env and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: MISTRAL_API_KEY,CLERK_ISSUER_URI,CLERK_JWKS_URI,DEV_PASSKEY_HASH,MONGODB_URI,CORS_ORIGINS
          script: |
            mv /opt/springboot/lyfe-game-server-0.0.1-SNAPSHOT.jar /opt/springboot/app.jar
            cat > /opt/springboot/.env << ENVEOF
            MISTRAL_API_KEY=${MISTRAL_API_KEY}
            CLERK_ISSUER_URI=${CLERK_ISSUER_URI}
            CLERK_JWKS_URI=${CLERK_JWKS_URI}
            DEV_PASSKEY_HASH=${DEV_PASSKEY_HASH}
            MONGODB_URI=${MONGODB_URI}
            CORS_ORIGINS=${CORS_ORIGINS}
            ENVEOF
            sudo systemctl restart springboot
            sleep 5
            sudo systemctl status springboot
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CLERK_ISSUER_URI: ${{ secrets.CLERK_ISSUER_URI }}
          CLERK_JWKS_URI: ${{ secrets.CLERK_JWKS_URI }}
          DEV_PASSKEY_HASH: ${{ secrets.DEV_PASSKEY_HASH }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
